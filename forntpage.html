<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Futuristic Interface</title>
    <style>
      /* Custom styles for JARVIS interface */
      .jarvis-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #0a0a0a;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.03) 0%, transparent 50%);
        overflow: hidden;
        font-family: 'Courier New', monospace;
      }

      /* Grid background */
      .grid-background {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50%;
        background-image: 
          linear-gradient(45deg, transparent 48%, rgba(0, 255, 255, 0.2) 49%, rgba(0, 255, 255, 0.2) 51%, transparent 52%),
          linear-gradient(-45deg, transparent 48%, rgba(0, 255, 255, 0.2) 49%, rgba(0, 255, 255, 0.2) 51%, transparent 52%);
        background-size: 30px 30px;
        opacity: 0.3;
        transform: perspective(500px) rotateX(45deg);
        transform-origin: bottom;
      }

      /* Code snippet - top left */
      .code-snippet {
        position: absolute;
        top: 60px;
        left: 60px;
        color: #00ffff;
        font-size: 14px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        line-height: 1.4;
      }

      .code-line {
        margin-bottom: 4px;
        opacity: 0.8;
      }

      /* Matrix formula - top right */
      .matrix-formula-top {
        position: absolute;
        top: 60px;
        right: 60px;
        color: #00ffff;
        font-size: 16px;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      }

      .matrix-label {
        margin-bottom: 10px;
        font-size: 18px;
      }

      .matrix-content {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }

      .matrix-bracket-left,
      .matrix-bracket-right {
        font-size: 48px;
        line-height: 1;
      }

      /* Robot Face - bottom left */
      .robot-face {
        position: absolute;
        bottom: 60px;
        left: 60px;
        width: 80px;
        height: 80px;
        color: #00ffff;
      }

      .robot-head {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Head outline */
      .head-outline {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 60px;
        height: 60px;
        border: 2px solid #00ffff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        animation: pulse-border 2s ease-in-out infinite alternate;
      }

      /* Robot eyes */
      .robot-eyes {
        position: absolute;
        top: 25px;
        left: 20px;
        width: 40px;
        height: 10px;
      }

      .eye {
        position: absolute;
        width: 8px;
        height: 8px;
        border: 2px solid #00ffff;
        border-radius: 50%;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        animation: blink-eyes 3s ease-in-out infinite;
      }

      .eye-left {
        left: 0;
      }

      .eye-right {
        right: 0;
      }

      /* Robot mouth */
      .robot-mouth {
        position: absolute;
        top: 45px;
        left: 30px;
        width: 20px;
        height: 2px;
        background: #00ffff;
        box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        animation: mouth-glow 2.5s ease-in-out infinite alternate;
      }

      /* Face detail lines */
      .face-details {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .detail-line {
        position: absolute;
        background: #00ffff;
        box-shadow: 0 0 3px rgba(0, 255, 255, 0.4);
        animation: detail-pulse 4s ease-in-out infinite;
      }

      .detail-1 {
        top: 20px;
        left: 5px;
        width: 8px;
        height: 1px;
        animation-delay: 0s;
      }

      .detail-2 {
        top: 20px;
        right: 5px;
        width: 8px;
        height: 1px;
        animation-delay: 1s;
      }

      /* JARVIS text */
      .jarvis-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 64px;
        font-weight: bold;
        color: #00ffff;
        text-shadow: 
          0 0 20px rgba(0, 255, 255, 0.8),
          0 0 40px rgba(0, 255, 255, 0.6),
          0 0 60px rgba(0, 255, 255, 0.4);
        letter-spacing: 6px;
        font-family: 'Arial', sans-serif;
        z-index: 5;
        animation: pulse-glow 2s ease-in-out infinite alternate;
      }

      /* Orbital paths around JARVIS text */
      .orbital-system {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 400px;
        z-index: 4;
      }

      .orbital-path {
        position: absolute;
        border: 1px dashed #00ffff;
        border-radius: 50%;
        opacity: 0.5;
        animation: rotate-clockwise linear infinite;
      }

      .orbital-path-1 {
        width: 300px;
        height: 300px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 20s;
      }

      .orbital-path-2 {
        width: 360px;
        height: 360px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 30s;
        animation-direction: reverse;
      }

      .orbital-node {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #00ffff;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        animation: pulse-node 1.5s ease-in-out infinite;
      }

      .node-1 {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .node-2 {
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
      }

      .node-3 {
        top: 50%;
        left: 0;
        transform: translateY(-50%);
      }

      .node-4 {
        top: 50%;
        right: 0;
        transform: translateY(-50%);
      }

      /* Hexagonal patterns */
      .hex-pattern {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        z-index: 3;
      }

      .hexagon {
        position: absolute;
        width: 40px;
        height: 23.09px; /* Height for a regular hexagon */
        background: transparent;
        border: 2px solid #00ffff;
        opacity: 0.3;
        animation: pulse-hex 3s ease-in-out infinite;
      }

      .hexagon:before,
      .hexagon:after {
        content: '';
        position: absolute;
        width: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
      }

      .hexagon:before {
        top: -11.55px;
        border-bottom: 11.55px solid #00ffff;
      }

      .hexagon:after {
        bottom: -11.55px;
        border-top: 11.55px solid #00ffff;
      }

      .hex-1 {
        top: 10%;
        left: 20%;
        animation-delay: 0s;
      }

      .hex-2 {
        top: 80%;
        left: 30%;
        animation-delay: 0.5s;
      }

      .hex-3 {
        top: 20%;
        right: 25%;
        animation-delay: 1s;
      }

      .hex-4 {
        bottom: 15%;
        right: 15%;
        animation-delay: 1.5s;
      }

      /* Animations */
      @keyframes rotate-clockwise {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes rotate-counter-clockwise {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(-360deg);
        }
      }

      @keyframes pulse-glow {
        from {
          text-shadow: 
            0 0 20px rgba(0, 255, 255, 0.8),
            0 0 40px rgba(0, 255, 255, 0.6),
            0 0 60px rgba(0, 255, 255, 0.4);
        }
        to {
          text-shadow: 
            0 0 30px rgba(0, 255, 255, 1),
            0 0 50px rgba(0, 255, 255, 0.8),
            0 0 70px rgba(0, 255, 255, 0.6);
        }
      }

      @keyframes pulse-node {
        0%, 100% {
          transform: translateX(-50%) scale(1);
        }
        50% {
          transform: translateX(-50%) scale(1.3);
        }
      }

      @keyframes pulse-hex {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.2);
        }
      }

      /* Robot face animations */
      @keyframes pulse-border {
        from {
          border-color: #00ffff;
          box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        to {
          border-color: #00cccc;
          box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }
      }

      @keyframes blink-eyes {
        0%, 90%, 100% {
          opacity: 1;
          transform: scaleY(1);
        }
        95% {
          opacity: 0.3;
          transform: scaleY(0.1);
        }
      }

      @keyframes mouth-glow {
        from {
          box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
          opacity: 0.8;
        }
        to {
          box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
          opacity: 1;
        }
      }

      @keyframes detail-pulse {
        0%, 100% {
          opacity: 0.6;
          transform: scaleX(1);
        }
        50% {
          opacity: 1;
          transform: scaleX(1.2);
        }
      }

      /* Flowchart diagram - bottom right */
      .flowchart-diagram {
        position: absolute;
        bottom: 60px;
        right: 60px;
        width: 200px;
        height: 250px;
        color: #00ffff;
      }

      .diagram-elements {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .diagram-box {
        position: absolute;
        width: 40px;
        height: 30px;
        border: 2px solid #00ffff;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      .box-1 {
        top: 0;
        left: 80px;
      }

      .box-2 {
        top: 60px;
        left: 20px;
      }

      .box-3 {
        top: 60px;
        left: 140px;
      }

      .box-4 {
        top: 120px;
        left: 80px;
      }

      .box-5 {
        top: 180px;
        left: 140px;
      }

      .diagram-diamond {
        position: absolute;
        top: 220px;
        left: 85px;
        width: 30px;
        height: 30px;
        border: 2px solid #00ffff;
        transform: rotate(45deg);
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      .diagram-lines {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .line {
        position: absolute;
        background: #00ffff;
        box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
      }

      .line-1 {
        top: 30px;
        left: 99px;
        width: 2px;
        height: 30px;
      }

      .line-2 {
        top: 90px;
        left: 60px;
        width: 40px;
        height: 2px;
      }

      .line-3 {
        top: 150px;
        left: 99px;
        width: 2px;
        height: 30px;
      }

      .line-4 {
        top: 210px;
        left: 99px;
        width: 2px;
        height: 30px;
      }

      .diagram-labels {
        position: absolute;
        font-size: 12px;
        font-family: 'Courier New', monospace;
      }

      .label-1 {
        position: absolute;
        top: 40px;
        left: 0;
      }

      .label-2 {
        position: absolute;
        top: 100px;
        left: 0;
      }

      /* Scattered dots */
      .scattered-dots {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .dot {
        position: absolute;
        width: 3px;
        height: 3px;
        background: #00ffff;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        animation: twinkle 3s ease-in-out infinite;
      }

      .dot-1 {
        top: 15%;
        left: 25%;
        animation-delay: 0s;
      }

      .dot-2 {
        top: 25%;
        left: 75%;
        animation-delay: 1s;
      }

      .dot-3 {
        top: 70%;
        left: 15%;
        animation-delay: 2s;
      }

      .dot-4 {
        top: 80%;
        left: 85%;
        animation-delay: 0.5s;
      }

      .dot-5 {
        top: 40%;
        left: 90%;
        animation-delay: 1.5s;
      }

      @keyframes twinkle {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.5);
        }
      }

      /* Responsive design */
      @media (max-width: 768px) {
        .jarvis-text {
          font-size: 42px;
          letter-spacing: 4px;
        }

        .code-snippet {
          top: 20px;
          left: 20px;
          font-size: 12px;
        }

        .matrix-formula-top {
          top: 20px;
          right: 20px;
          font-size: 14px;
        }

        .robot-face {
          bottom: 20px;
          left: 20px;
          transform: scale(0.8);
        }

        .flowchart-diagram {
          bottom: 20px;
          right: 20px;
          transform: scale(0.8);
        }

        .orbital-system {
          width: 300px;
          height: 300px;
        }

        .orbital-path-1 {
          width: 220px;
          height: 220px;
        }

        .orbital-path-2 {
          width: 280px;
          height: 280px;
        }

        .hex-pattern {
          width: 300px;
          height: 300px;
        }

        .hexagon {
          width: 30px;
          height: 17.32px;
        }

        .hexagon:before,
        .hexagon:after {
          border-left: 15px solid transparent;
          border-right: 15px solid transparent;
        }

        .hexagon:before {
          top: -8.66px;
          border-bottom: 8.66px solid #00ffff;
        }

        .hexagon:after {
          bottom: -8.66px;
          border-top: 8.66px solid #00ffff;
        }
      }

      /* Browser compatibility - vendor prefixes */
      @-webkit-keyframes rotate-clockwise {
        from { -webkit-transform: translate(-50%, -50%) rotate(0deg); }
        to { -webkit-transform: translate(-50%, -50%) rotate(360deg); }
      }

      @-webkit-keyframes rotate-counter-clockwise {
        from { -webkit-transform: translate(-50%, -50%) rotate(0deg); }
        to { -webkit-transform: translate(-50%, -50%) rotate(-360deg); }
      }

      @-webkit-keyframes pulse-glow {
        from {
          -webkit-text-shadow: 
            0 0 20px rgba(0, 255, 255, 0.8),
            0 0 40px rgba(0, 255, 255, 0.6),
            0 0 60px rgba(0, 255, 255, 0.4);
        }
        to {
          -webkit-text-shadow: 
            0 0 30px rgba(0, 255, 255, 1),
            0 0 50px rgba(0, 255, 255, 0.8),
            0 0 70px rgba(0, 255, 255, 0.6);
        }
      }
    </style>
  </head>
  <body>
   
    <div class="jarvis-container">
      <!-- Grid Background -->
      <div class="grid-background"></div>

      <!-- Code Snippet (Top Left) -->
      <div class="code-snippet">
        <div class="code-line">> SYS_INIT: 0x4A4152564953</div>
        <div class="code-line">> CORE_STATUS: ONLINE</div>
        <div class="code-line">> PROTOCOL: v2.3.1</div>
        <div class="code-line">> DATA_STREAM: ACTIVE</div>
      </div>

      <!-- Matrix Formula (Top Right) -->
      <div class="matrix-formula-top">
        <div class="matrix-label">SYSTEM MATRIX</div>
        <div class="matrix-content">
          <span class="matrix-bracket-left">[</span>
          <span style="margin: 0 10px;">
            1 0 0<br />
            0 1 0<br />
            0 0 1
          </span>
          <span class="matrix-bracket-right">]</span>
        </div>
        <div class="matrix-label">AI CORE</div>
      </div>

      <!-- Orbital System (Around JARVIS text) -->
      <div class="orbital-system">
        <div class="orbital-path orbital-path-1">
          <div class="orbital-node node-1"></div>
          <div class="orbital-node node-2"></div>
        </div>
        <div class="orbital-path orbital-path-2">
          <div class="orbital-node node-3"></div>
          <div class="orbital-node node-4"></div>
        </div>
      </div>

      <!-- Hexagonal Pattern (Around JARVIS text) -->
      <div class="hex-pattern">
        <div class="hexagon hex-1"></div>
        <div class="hexagon hex-2"></div>
        <div class="hexagon hex-3"></div>
        <div class="hexagon hex-4"></div>
      </div>

      <!-- JARVIS Text (Center) -->
      <div class="jarvis-text">JARVIS</div>

      <!-- Robot Face (Bottom Left) -->
      <div class="robot-face">
        <div class="robot-head">
          <div class="head-outline"></div>
          <div class="robot-eyes">
            <div class="eye eye-left"></div>
            <div class="eye eye-right"></div>
          </div>
          <div class="robot-mouth"></div>
          <div class="face-details">
            <div class="detail-line detail-1"></div>
            <div class="detail-line detail-2"></div>
          </div>
        </div>
      </div>

      <!-- Flowchart Diagram (Bottom Right) -->
      <div class="flowchart-diagram">
        <div class="diagram-elements">
          <div class="diagram-box box-1"></div>
          <div class="diagram-box box-2"></div>
          <div class="diagram-box box-3"></div>
          <div class="diagram-box box-4"></div>
          <div class="diagram-box box-5"></div>
          <div class="diagram-diamond"></div>
          <div class="diagram-lines">
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
            <div class="line line-4"></div>
          </div>
          <div class="diagram-labels">
            <div class="label-1">PROCESS FLOW</div>
            <div class="label-2">DECISION NODE</div>
          </div>
        </div>
      </div>

      <!-- Scattered Dots -->
      <div class="scattered-dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>
        <div class="dot dot-5"></div>
      </div>
    </div>
  </body>
</html>
